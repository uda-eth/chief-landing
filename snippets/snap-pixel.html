<!--
  Optional: enriched SIGN_UP with hashed email
  If the form posts back to the page or you can read the email from a URL param,
  fire SIGN_UP with the user_email parameter so Snap can match conversions to ad views.

  Snap will SHA-256 hash it on their side. Do not hash it yourself.

  Example (replace the body and paste in addition to, or in place of, the SIGN_UP block above):

  snaptr('track', 'SIGN_UP', { user_email: 'user@example.com' });

  Pull the email from the URL query if you appended it on form submit:

  const params = new URLSearchParams(window.location.search);
  const email = params.get('lead_email');
  if (email) snaptr('track', 'SIGN_UP', { user_email: email });
  else snaptr('track', 'SIGN_UP');
-->
